components:
  x-finboard-role-notes:
    bankingCustomer:
      roles: [user]
      personas: [Retail investor]
    bankingAdmin:
      roles: [admin]
      personas: [KYC Review Admin, Operations Admin]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT from any successful login:
        - Flow A: `POST /api/auth/verify-otp` (after signup)
        - Flow B: `POST /api/auth/signin`
        - Flow C: `POST /api/auth/phone-login`
        - Flow D: `POST /api/auth/admin/signin`

        In Scalar, click **Authorize** and enter: `Bearer <your-token>`

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api-gateway
        routes:
          type: array
          items:
            type: object
            properties:
              prefix:
                type: string
              target:
                type: string

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          example: "+919876543210"
        role:
          type: string
          enum: [user, admin, rta_admin, amc_admin]
        phoneVerified:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          id: 507f1f77bcf86cd799439011
          name: Rahul Sharma
          email: user@finboard.local
          phone: "+919876543210"
          role: user
          phoneVerified: true
          emailVerified: false
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: "#/components/schemas/User"

    SignupPendingResponse:
      type: object
      required: [message, requiresPhoneVerification, registrationComplete, user]
      properties:
        message:
          type: string
          example: Account created. OTP sent to your phone for verification.
        requiresPhoneVerification:
          type: boolean
          example: true
        registrationComplete:
          type: boolean
          example: false
        user:
          $ref: "#/components/schemas/User"

    VerifyOtpResponse:
      type: object
      properties:
        message:
          type: string
        registrationComplete:
          type: boolean
          description: true when signup is finished and JWT is issued
        approved:
          type: boolean
        provider:
          type: string
        status:
          type: string
        token:
          type: string
          description: Present when registrationComplete is true
        user:
          $ref: "#/components/schemas/User"

    SendOtpResponse:
      type: object
      properties:
        message:
          type: string
        provider:
          type: string
        sid:
          type: string
        status:
          type: string
        to:
          type: string
        channel:
          type: string

    ForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
        provider:
          type: string

    SignupRequest:
      type: object
      required: [name, email, phone, password]
      example:
        name: Test User
        email: newuser@finboard.local
        phone: "+919900007777"
        password: User@12345
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
          example: Test User
        email:
          type: string
          format: email
          example: newuser@finboard.local
        phone:
          type: string
          description: E.164 format, e.g. +919876543210
          example: "+919900007777"
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: User@12345

    SigninRequest:
      type: object
      required: [email, password]
      example:
        email: user@finboard.local
        password: User@12345
      properties:
        email:
          type: string
          format: email
          example: user@finboard.local
        password:
          type: string
          example: User@12345

    AdminSigninRequest:
      allOf:
        - $ref: "#/components/schemas/SigninRequest"
        - type: object
          example:
            email: admin@finboard.local
            password: Admin@12345
            adminRole: admin
          properties:
            adminRole:
              type: string
              enum: [admin, rta_admin, amc_admin]
              example: admin

    SendOtpRequest:
      type: object
      required: [phone]
      example:
        phone: "+919876543210"
      properties:
        phone:
          type: string
          description: E.164 format
          example: "+919876543210"

    VerifyOtpRequest:
      type: object
      required: [phone, otp]
      example:
        phone: "+919900007777"
        otp: "123456"
      properties:
        phone:
          type: string
          description: E.164 format
          example: "+919900007777"
        otp:
          type: string
          pattern: "^\\d{4,8}$"
          example: "123456"

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      example:
        currentPassword: User@12345
        newPassword: NewPass@12345
      properties:
        currentPassword:
          type: string
          example: User@12345
        newPassword:
          type: string
          minLength: 8
          maxLength: 72
          example: NewPass@12345

    ResetPasswordRequest:
      type: object
      required: [email, otp, newPassword]
      example:
        email: user@finboard.local
        otp: "123456"
        newPassword: User@12345
      properties:
        email:
          type: string
          format: email
          example: user@finboard.local
        otp:
          type: string
          example: "123456"
        newPassword:
          type: string
          minLength: 8
          example: User@12345

    Profile:
      type: object
      properties:
        userId:
          type: string
        fullName:
          type: string
        kycStatus:
          type: string
        pan:
          type: string
        mobileNumber:
          type: string
        emailAddress:
          type: string
        address:
          type: object

    ProfileUpdateRequest:
      type: object
      properties:
        fullName:
          type: string
        dateOfBirth:
          type: string
        pan:
          type: string
        mobileNumber:
          type: string
        emailAddress:
          type: string
        maritalStatus:
          type: string
          enum: ["", Single, Married, Other]
        gender:
          type: string
        incomeRange:
          type: string
        occupation:
          type: string
        address:
          type: object
          properties:
            line1:
              type: string
            city:
              type: string
            state:
              type: string
            postalCode:
              type: string
            country:
              type: string

    KycApplication:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        name:
          type: string
        panNumber:
          type: string
        aadhaarNumber:
          type: string
        status:
          type: string
          enum:
            - draft
            - pending_admin_review
            - approved
            - rejected
            - failed
        aiVerification:
          $ref: "#/components/schemas/AiVerification"
        adminRemarks:
          type: string
        createdAt:
          type: string
          format: date-time

    AiVerification:
      type: object
      properties:
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
        recommendation:
          type: string
          enum: [approve, review, reject]
        fields:
          type: object
          additionalProperties: true
        alignments:
          type: object
          properties:
            userInputVsIdentity:
              type: integer
            ocrVsIdentity:
              type: integer
            imagesVsIdentity:
              type: integer
              nullable: true
        summary:
          type: string
        verificationSource:
          type: string
          example: mistral_vision
        model:
          type: string
        verifiedAt:
          type: string
          format: date-time

    VerifyBankRequest:
      type: object
      required: [accountNumber, ifsc, accountHolderName]
      properties:
        accountNumber:
          type: string
          pattern: "^\\d{12}$"
        ifsc:
          type: string
          example: HDFC0001234
        accountHolderName:
          type: string

    BeneficiaryRequest:
      type: object
      required: [accountNumber, ifsc]
      properties:
        accountNumber:
          type: string
        ifsc:
          type: string

    TransferRequest:
      type: object
      required: [accountNumber, ifsc, amount]
      properties:
        accountNumber:
          type: string
        ifsc:
          type: string
        amount:
          type: number
          exclusiveMinimum: 0
        remarks:
          type: string
          maxLength: 120

    BuyRequest:
      type: object
      required: [symbol, name, price, quantity]
      properties:
        symbol:
          type: string
          example: RELIANCE
        name:
          type: string
        price:
          type: number
          exclusiveMinimum: 0
        quantity:
          type: number
          exclusiveMinimum: 0
        assetType:
          type: string
          enum: [stock, mutual_fund]
          default: stock

    SipRequest:
      type: object
      required: [symbol, name, nav, monthlyAmount, sipDate]
      properties:
        symbol:
          type: string
        name:
          type: string
        nav:
          type: number
          exclusiveMinimum: 0
        monthlyAmount:
          type: number
          minimum: 100
        sipDate:
          type: integer
          minimum: 1
          maximum: 28

    Holding:
      type: object
      properties:
        _id:
          type: string
        symbol:
          type: string
        name:
          type: string
        assetType:
          type: string
        quantity:
          type: number
        purchasePrice:
          type: number
        orderStatus:
          type: string

    Notification:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
